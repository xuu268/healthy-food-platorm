name: PR Automation

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    branches: [ main, develop ]

jobs:
  # PR标签和分配自动化
  pr-labeler:
    name: PR Labeler and Assigner
    runs-on: ubuntu-latest
    steps:
      - name: Check PR changes
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number
            });

            const labels = new Set();
            const reviewers = new Set();

            // 根据文件路径添加标签
            for (const file of files) {
              if (file.filename.startsWith('backend/')) {
                labels.add('backend');
                reviewers.add('backend-team');
              }
              if (file.filename.startsWith('frontend/')) {
                labels.add('frontend');
                reviewers.add('frontend-team');
              }
              if (file.filename.includes('test')) {
                labels.add('testing');
              }
              if (file.filename.includes('docs/')) {
                labels.add('documentation');
              }
              if (file.filename.includes('security')) {
                labels.add('security');
                reviewers.add('security-team');
              }
              if (file.filename.includes('database')) {
                labels.add('database');
              }
            }

            // 根据PR标题和描述添加标签
            const prTitle = context.payload.pull_request.title.toLowerCase();
            const prBody = context.payload.pull_request.body?.toLowerCase() || '';

            if (prTitle.includes('feat') || prTitle.includes('feature')) {
              labels.add('feature');
            }
            if (prTitle.includes('fix') || prTitle.includes('bug')) {
              labels.add('bug');
            }
            if (prTitle.includes('refactor')) {
              labels.add('refactor');
            }
            if (prTitle.includes('docs')) {
              labels.add('documentation');
            }
            if (prTitle.includes('test')) {
              labels.add('testing');
            }
            if (prTitle.includes('security')) {
              labels.add('security');
            }

            // 添加大小标签
            const changedLines = files.reduce((sum, file) => sum + file.additions + file.deletions, 0);
            if (changedLines < 10) {
              labels.add('size/xs');
            } else if (changedLines < 50) {
              labels.add('size/s');
            } else if (changedLines < 250) {
              labels.add('size/m');
            } else if (changedLines < 1000) {
              labels.add('size/l');
            } else {
              labels.add('size/xl');
            }

            // 更新PR标签
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: Array.from(labels)
            });

            // 添加评论说明标签
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `🚀 PR自动化: 已添加标签 ${Array.from(labels).map(l => `\`${l}\``).join(', ')}`
            });

  # 代码质量检查
  code-quality-check:
    name: Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          languages: java, javascript

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  # 测试覆盖率检查
  test-coverage:
    name: Test Coverage Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Run tests with coverage
        run: |
          cd backend
          mvn test jacoco:report

      - name: Check coverage threshold
        run: |
          cd backend
          # 这里可以添加覆盖率阈值检查
          echo "Coverage check would run here"
          # 实际项目中可以使用jacoco-maven-plugin的check目标

      - name: Comment coverage results
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `📊 测试覆盖率检查完成\n\n✅ 所有测试通过\n📈 覆盖率报告已生成`
            });

  # 依赖更新检查
  dependency-check:
    name: Dependency Update Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Check for outdated dependencies
        run: |
          echo "Checking for outdated dependencies..."
          # 检查后端依赖
          if [ -f "backend/pom.xml" ]; then
            cd backend
            echo "## Backend Dependencies" >> $GITHUB_STEP_SUMMARY
            mvn versions:display-dependency-updates | grep -A5 "The following dependencies" >> $GITHUB_STEP_SUMMARY || true
          fi

          # 检查前端依赖
          if [ -f "frontend/package.json" ]; then
            cd frontend
            echo "## Frontend Dependencies" >> $GITHUB_STEP_SUMMARY
            npm outdated --json | jq -r 'to_entries[] | "\(.key): \(.value.current) -> \(.value.latest)"' >> $GITHUB_STEP_SUMMARY || true
          fi

      - name: Comment dependency updates
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const summary = await require('fs').promises.readFile(process.env.GITHUB_STEP_SUMMARY, 'utf8');
            
            if (summary.includes('->')) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: `📦 依赖更新检查\n\n发现可更新的依赖:\n\`\`\`\n${summary}\n\`\`\``
              });
            }

  # PR合并检查
  merge-check:
    name: Merge Requirements Check
    runs-on: ubuntu-latest
    needs: [code-quality-check, test-coverage]
    steps:
      - name: Check merge requirements
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number
            });

            const { data: checks } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: pr.head.sha
            });

            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number
            });

            const requirements = {
              hasApproval: reviews.some(r => r.state === 'APPROVED'),
              allChecksPassed: checks.check_runs.every(c => c.conclusion === 'success'),
              noConflicts: !pr.mergeable_state?.includes('conflict'),
              hasDescription: pr.body && pr.body.trim().length > 50,
              hasLinkedIssue: pr.body?.includes('#') || pr.body?.includes('https://github.com/') || false
            };

            const missingRequirements = Object.entries(requirements)
              .filter(([_, met]) => !met)
              .map(([req]) => req);

            if (missingRequirements.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: `⚠️ 合并要求检查\n\n以下要求未满足:\n${missingRequirements.map(req => `- ${req}`).join('\n')}\n\n请确保满足所有要求后再请求合并。`
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: `✅ 所有合并要求已满足\n\n可以安全合并此PR。`
              });
            }

  # 自动合并Dependabot PR
  auto-merge-dependabot:
    name: Auto-merge Dependabot PR
    if: github.actor == 'dependabot[bot]' || github.actor == 'dependabot-preview[bot]'
    runs-on: ubuntu-latest
    needs: [code-quality-check, test-coverage]
    steps:
      - name: Enable auto-merge for Dependabot PR
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.enableAutoMerge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              merge_method: 'squash'
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: '🤖 自动合并已启用\n\n此Dependabot PR将在所有检查通过后自动合并。'
            });

  # PR关闭时清理
  cleanup-on-close:
    name: Cleanup on PR Close
    if: github.event.action == 'closed' && !github.event.pull_request.merged
    runs-on: ubuntu-latest
    steps:
      - name: Delete associated branch
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            
            // 只删除非保护分支且不是默认分支
            if (pr.head.ref !== 'main' && pr.head.ref !== 'develop') {
              try {
                await github.rest.git.deleteRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `heads/${pr.head.ref}`
                });
                console.log(`Deleted branch: ${pr.head.ref}`);
              } catch (error) {
                console.log(`Could not delete branch ${pr.head.ref}:`, error.message);
              }
            }

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true